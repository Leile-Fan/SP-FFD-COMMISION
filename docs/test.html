<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test</title></head>
<body>
<h1>Test Page</h1>
<div id="result">Loading...</div>
<script>
fetch('./data/manual.json')
  .then(r => r.json())
  .then(d => {
    document.getElementById('result').innerHTML = 'Manual loaded! ' + d.chapters.length + ' chapters, first: ' + d.chapters[0].titleCn;
  })
  .catch(e => {
    document.getElementById('result').innerHTML = 'Error: ' + e.message;
  });
</script>
</body>
</html>
